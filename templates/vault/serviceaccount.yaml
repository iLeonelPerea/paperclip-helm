{{- if .Values.vault.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.vault.serviceAccount }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  annotations:
    # This SA is used by ESO to authenticate with Vault via Kubernetes auth
    # Vault role: {{ .Values.vault.role }}
    # Vault mount: {{ .Values.vault.mount }}
automountServiceAccountToken: true
{{- end }}
