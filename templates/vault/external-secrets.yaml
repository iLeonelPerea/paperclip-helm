{{- if .Values.vault.enabled }}
---
# ExternalSecret: Auth (BETTER_AUTH_SECRET)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "paperclip.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.vault.refreshInterval }}
  secretStoreRef:
    name: {{ include "paperclip.fullname" . }}-vault-store
    kind: ClusterSecretStore
  target:
    name: {{ include "paperclip.fullname" . }}-secret
    deletionPolicy: {{ .Values.vault.deletionPolicy }}
  data:
    - secretKey: better-auth-secret
      remoteRef:
        key: paperclip-auth
        property: better-auth-secret
---
# ExternalSecret: Database credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "paperclip.fullname" . }}-db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.vault.refreshInterval }}
  secretStoreRef:
    name: {{ include "paperclip.fullname" . }}-vault-store
    kind: ClusterSecretStore
  target:
    name: {{ include "paperclip.fullname" . }}-db-secret
    deletionPolicy: {{ .Values.vault.deletionPolicy }}
  data:
    {{- if .Values.postgresql.enabled }}
    - secretKey: database-url
      remoteRef:
        key: paperclip-db
        property: database-url
    - secretKey: username
      remoteRef:
        key: paperclip-db
        property: username
    - secretKey: password
      remoteRef:
        key: paperclip-db
        property: password
    - secretKey: database
      remoteRef:
        key: paperclip-db
        property: database
    {{- else }}
    - secretKey: database-url
      remoteRef:
        key: paperclip-db
        property: database-url
    {{- end }}
{{- end }}
