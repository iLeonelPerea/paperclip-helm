{{- if not .Values.vault.enabled }}
{{- if not .Values.auth.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  better-auth-secret: {{ .Values.auth.betterAuthSecret | b64enc | quote }}
{{- end }}
{{- if and (not .Values.postgresql.auth.existingSecret) (not .Values.externalDatabase.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperclip.fullname" . }}-db-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperclip.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if .Values.postgresql.enabled }}
  database-url: {{ printf "postgresql://%s:%s@%s:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "paperclip.postgresServiceName" .) .Values.postgresql.auth.database | b64enc | quote }}
  username: {{ .Values.postgresql.auth.username | b64enc | quote }}
  password: {{ .Values.postgresql.auth.password | b64enc | quote }}
  database: {{ .Values.postgresql.auth.database | b64enc | quote }}
  {{- else }}
  database-url: {{ .Values.externalDatabase.url | b64enc | quote }}
  {{- end }}
{{- end }}
{{- end }}
