# =============================================================================
# Paperclip Helm Chart - OVH Production Values
# Cluster: kubernetes-admin@services  |  Namespace: platform
# Storage: csi-cinder-high-speed (OVH Cinder default)
# =============================================================================

nameOverride: ""
fullnameOverride: ""
timezone: "America/Mexico_City"

# -- Image
image:
  repository: ghcr.io/paperclipai/paperclip
  tag: "latest"
  pullPolicy: Always

replicaCount: 1

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 3100
  annotations: {}

# =============================================================================
# Ingress - Traefik (standard Ingress class)
# =============================================================================
ingress:
  # Disabled — cluster uses Traefik IngressRoute CRD (see ingressroute-paperclip.yaml)
  enabled: false

# =============================================================================
# Resources
# =============================================================================
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

# =============================================================================
# Persistence - /paperclip volume
# =============================================================================
persistence:
  enabled: true
  storageClass: "csi-cinder-high-speed"
  accessMode: ReadWriteOnce
  size: 10Gi

# =============================================================================
# Application Config
# =============================================================================
config:
  port: 3100
  serveUI: true
  deploymentMode: authenticated
  deploymentExposure: private
  publicURL: "https://crew.alebrije.io"

# =============================================================================
# Auth Secret (BETTER_AUTH_SECRET)
# Secret creado manualmente: kubectl create secret generic paperclip-auth-secret
# =============================================================================
auth:
  betterAuthSecret: ""
  existingSecret: "paperclip-auth-secret"
  existingSecretKey: "better-auth-secret"

# =============================================================================
# External Database - usa postgres existente en namespace platform
# postgres.platform.svc.cluster.local:5432
# Secret creado manualmente: kubectl create secret generic paperclip-db-secret
# =============================================================================
postgresql:
  enabled: false

externalDatabase:
  url: ""
  existingSecret: "paperclip-db-secret"
  existingSecretKey: "database-url"

# =============================================================================
# Vault + ESO - deshabilitado inicialmente
# Activar cuando los paths existan en Vault: secret/data/paperclip/*
# =============================================================================
vault:
  enabled: false
  address: "http://vault.vault.svc.cluster.local:8200"
  tlsSkipVerify: false
  role: "paperclip"
  mount: "paperclip"
  authPath: "kubernetes"
  serviceAccount: "paperclip-vault-auth"
  namespace: "vault"
  refreshInterval: "1h"
  deletionPolicy: "Retain"

# =============================================================================
# Security Contexts
# =============================================================================
podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  # Paperclip entrypoint starts as root then drops to 'node' via setuid().
  # CAP_SETUID must be retained — drop: ALL removes it and breaks the user switch.
  # runAsNonRoot/runAsUser are nulled so K8s doesn't enforce a UID before the switch.
  runAsNonRoot: false
  runAsUser: null
  runAsGroup: null
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - NET_RAW
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_CHROOT

# =============================================================================
# Scheduling
# =============================================================================
nodeSelector: {}
tolerations: []
affinity: {}

# =============================================================================
# ServiceAccount
# =============================================================================
serviceAccount:
  create: true
  name: ""
  annotations: {}

# =============================================================================
# Autoscaling - deshabilitado (app stateful via PVC)
# =============================================================================
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# =============================================================================
# PodDisruptionBudget
# =============================================================================
podDisruptionBudget:
  enabled: false

# =============================================================================
# NetworkPolicy
# =============================================================================
networkPolicy:
  enabled: true
  traefikNamespace: "services"

# =============================================================================
# Reloader (Stakater) - instalado en el cluster OVH
# =============================================================================
reloader:
  enabled: true
