apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: paperclip-allow-traefik
  namespace: platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: paperclip
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: services
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - port: 3100
          protocol: TCP
